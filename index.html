<!DOCTYPE html>
<html>
	<head>
		<title>Tela de Login</title>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width">
		<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
	</head>
<body>
	<nav	class="navbar bg-danger">
		<a class="navbar-brand text-light" href="#">Tela de Login</a>
	</nav>
	
	<div class="container-fluid">
		<form>
			<div class="form-group">
				<h1>Faça Seu Login</h1>			
				<label for="InputEmail1">Endereço de email</label>
				<input type="email" class="form-control" id="InputEmail1" aria-describedby="emailHelp" placeholder="Seu email">
			</div>
			<div class="form-group">
				<label for="InputPassword1">Senha</label>
				<input type="password" class="form-control" id="InputPassword1" placeholder="Senha">
			</div>
			<div class="form-group form-check">
				<input type="checkbox" class="form-check-input" id="exampleCheck1">
				<label class="form-check-label" for="exampleCheck1">Salvar Senha</label>
			</div>
			<button type="submit" class="btn btn-danger">Login</button>
			<aspan class="text-primary" data-toggle="modal" data-target="#recuperarsenha">Esqueci a senha	</aspan>
			<div class="modal fade" id="recuperarsenha" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true">
				<div class="modal-dialog" role="document">
					<div class="modal-content">
						<div class="modal-header">
							<h5 class="modal-title" id="exampleModalLabel">Recuperação de Senha</h5>
							<button type="button" class="close" data-dismiss="modal" aria-label="Fechar">
								<span aria-hidden="true">&times;</span>
							</button>
						</div>
						<div class="modal-body">
							<div class="form-group">
								<label for="InputEmail2">Digite seu Email</label>
								<input type="email" class="form-control" id="InputEmail2" aria-describedby="emailHelp" placeholder="Seu email">
						</div>
						<div class="modal-footer">
							<button type="button" class="btn btn-secondary" data-dismiss="modal">Cancelar</button>
							<button type="button" class="btn btn-danger">Enviar</button>
						</div>
					</div>
				</div>
			</div>
		</div>																					
	
		<p>Ainda não possui conta? <aspan class="text-primary" data-toggle="modal" data-target="#criarconta">Registre-se!</aspan>
		<div class="modal fade" id="criarconta" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true">
			<div class="modal-dialog" role="document">
				<div class="modal-content">
					<div class="modal-header">
						<h5 class="modal-title" id="exampleModalLabel">Registre-se</h5>
						<button type="button" class="close" data-dismiss="modal" aria-label="Fechar">
							<span aria-hidden="true">&times;</span>
						</button>
					</div>
					<div class="modal-body">
						<div class="form-group">
							<label for="InputName">Nome Completo</label>
							<input type="text" class="form-control" id="InputName"  placeholder="Seu nome">
						</div>
						<div class="form-group">
							<label for="InputEmail3">Email</label>
							<input type="email" class="form-control" id="InputEmail3" aria-describedby="emailHelp" placeholder="Seu email">
						</div>
						<div class="form-group">
							<label for="InputPassword2">Senha</label>
							<input type="password" class="form-control" id="InputPassword2" placeholder="Sua Senha">
						</div>
					</div>
					<div class="modal-footer">
						<button type="button" class="btn btn-secondary" data-dismiss="modal">Cancelar</button>
						<button type="button" class="btn btn-danger">Enviar</button>
					</div>
				</div>
			</div>
		</form>
	</div>

	<script src="script.js"></script>
	<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.3/umd/popper.min.js" integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49" crossorigin="anonymous"></script>
	<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js" integrity="sha384-ChfqqxuZUCnJSK3+MXmPNIyE6ZbWh2IMqE241rYiqJxyMiZ6OW/JmZQ5stwEULTy" crossorigin="anonymous"></script>
</body>
        </html>
